<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bootstrap Grid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center mb-4">Responsive Grid Layout</h2>
        <div class="row">
            <div class="col-md-4 col-sm-6 col-12 mb-3">
                <div class="p-3 bg-primary text-white text-center">Column 1</div>
            </div>
            <div class="col-md-4 col-sm-6 col-12 mb-3">
                <div class="p-3 bg-secondary text-white text-center">Column 2</div>
            </div>
            <div class="col-md-4 col-sm-6 col-12 mb-3">
                <div class="p-3 bg-success text-white text-center">Column 3</div>
            </div>
        </div>
    </div>
</body>
</html>
