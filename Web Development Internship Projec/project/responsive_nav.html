<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Responsive Nav Menu</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .navbar {
            background-color: #333;
            overflow: hidden;
        }

        .navbar a {
            float: left;
            display: block;
            color: #f2f2f2;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
        }

        .navbar a:hover {
            background-color: #ddd;
            color: black;
        }

        .hamburger {
            display: none;
            float: right;
            padding: 14px 16px;
            cursor: pointer;
            color: white;
        }

        .navbar-links {
            display: flex;
        }

        @media screen and (max-width: 600px) {
            .navbar a { display: none; }
            .navbar .hamburger { display: block; }
            .navbar.responsive .navbar-links {
                flex-direction: column;
                width: 100%;
            }
            .navbar.responsive a {
                display: block;
                text-align: left;
            }
        }
    </style>
</head>
<body>

<div class="navbar" id="navbar">
    <div class="hamburger" onclick="toggleMenu()">☰</div>
    <div class="navbar-links">
        <a href="#">Home</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </div>
</div>

<script>
    function toggleMenu() {
        var nav = document.getElementById("navbar");
        nav.classList.toggle("responsive");
    }
</script>

</body>
</html>
